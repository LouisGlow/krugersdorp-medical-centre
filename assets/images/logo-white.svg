<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 88" width="420" height="88" role="img" aria-label="Krugersdorp Medical Centre">
  <defs>
    <linearGradient id="goldLineW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fad690"/>
      <stop offset="100%" stop-color="#c4920a"/>
    </linearGradient>
    <linearGradient id="goldTextW" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde09a"/>
      <stop offset="100%" stop-color="#d4a020"/>
    </linearGradient>
  </defs>

  <!-- ── BADGE ── -->
  <circle cx="44" cy="44" r="42" fill="rgba(255,255,255,0.08)"/>
  <circle cx="44" cy="44" r="42" fill="none" stroke="url(#goldLineW)" stroke-width="1.8"/>
  <circle cx="44" cy="44" r="35" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>

  <!-- Cross arms -->
  <rect x="38.5" y="16" width="11" height="56" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="16"   y="38.5" width="56" height="11" rx="2" fill="rgba(255,255,255,0.06)"/>

  <rect x="40" y="17"  width="8" height="14" rx="1.5" fill="rgba(247,200,115,0.18)"/>
  <rect x="57" y="40"  width="14" height="8"  rx="1.5" fill="rgba(247,200,115,0.18)"/>
  <rect x="40" y="57"  width="8" height="14" rx="1.5" fill="rgba(247,200,115,0.18)"/>
  <rect x="17" y="40"  width="14" height="8"  rx="1.5" fill="rgba(247,200,115,0.18)"/>

  <!-- KMC -->
  <text x="44" y="41"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="18" font-weight="700"
        fill="url(#goldTextW)"
        letter-spacing="4">KMC</text>

  <line x1="26" y1="50" x2="62" y2="50" stroke="rgba(247,200,115,0.4)" stroke-width="0.8"/>

  <text x="44" y="61"
        text-anchor="middle"
        font-family="'Arial Narrow',Arial,sans-serif"
        font-size="7" fill="rgba(247,200,115,0.7)"
        letter-spacing="3">EST. 1994</text>

  <!-- ── WORDMARK ── -->
  <text x="104" y="36"
        font-family="Georgia,'Times New Roman',serif"
        font-size="21" font-weight="700"
        fill="#ffffff">Krugersdorp</text>
  <text x="104" y="59"
        font-family="Georgia,'Times New Roman',serif"
        font-size="21" font-weight="700"
        fill="#ffffff">Medical Centre</text>

  <line x1="104" y1="65" x2="368" y2="65" stroke="rgba(247,200,115,0.5)" stroke-width="1"/>

  <text x="104" y="77"
        font-family="'Arial Narrow',Arial,sans-serif"
        font-size="8.5" fill="rgba(255,255,255,0.5)"
        letter-spacing="3.2">NOORDHEUWEL · KRUGERSDORP · EST. 1994</text>
</svg>
