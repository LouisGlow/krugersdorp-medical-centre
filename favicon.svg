<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2d52"/>
      <stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fad690"/>
      <stop offset="100%" stop-color="#c4920a"/>
    </linearGradient>
  </defs>

  <!-- Badge circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#gold)" stroke-width="2.5"/>

  <!-- Subtle cross arms -->
  <rect x="28" y="12" width="8"  height="40" rx="2" fill="rgba(110,163,193,0.12)"/>
  <rect x="12" y="28" width="40" height="8"  rx="2" fill="rgba(110,163,193,0.12)"/>

  <!-- KMC monogram -->
  <text x="32" y="37"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="16" font-weight="700"
        fill="#f7c873"
        letter-spacing="2">KMC</text>
</svg>
